#
# This is a reusable worflow to be triggered from other projects or manually.
# See example-trigger.yaml for how to use it in other projects.
# If you call this via a different trigger than on: issue_comment you can use the optional parameter:
#  comment - full comment body, e.g. "/ost he-basic-suite-master centos9"
#
name: OST trigger

on:
  workflow_call:
    inputs:
      comment:
        required: false
        type: string
      pr_url:
        required: false
        type: string

  workflow_dispatch:
    inputs:
      pr_url:
        description: "PR url(s - comma separated)"
        type: string
      comment:
        required: true
        default: "/ost basic-suite-master centos9"
        type: string
        
permissions:
  pull-requests: write

jobs:
  decode_comment:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' ||
        github.event_name == 'push' ||
      ( github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/ost') && (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR')
      )
    outputs:
      SUITE: ${{ steps.set-vars.outputs.SUITE }}
      DISTRO: ${{ steps.set-vars.outputs.DISTRO }}
      DISTRO_JSON: ${{ steps.set-vars.outputs.DISTRO_JSON }}
      PR_URL: ${{ steps.set-vars.outputs.PR_URL }}
      COMMENT: ${{ steps.set-vars.outputs.COMMENT }}
      RUN_URL: ${{ steps.set-vars.outputs.RUN_URL }}
      OST_REF: ${{ steps.set-vars.outputs.OST_REF }}
    steps:
      - name: Set environment variables
        id: set-vars
        env:
          PR_URL: "${{ github.event.issue.pull_request.url }}${{ inputs.pr_url }}"
          COMMENT: "${{ github.event.comment.body }}${{ inputs.comment }}"
        run: |
          SUITE=$(echo "$COMMENT" | cut -d " " -s -f2)
          DISTRO=$(echo "$COMMENT" | cut -d " " -s -f3)
          SUITE=${SUITE:-basic-suite-master}
          DISTRO=${DISTRO:-centos9}

          if [[ "$DISTRO" == "all" ]]; then
            DISTRO="centos9,centos10,almalinux9,almalinux10"
          fi

          DISTRO_JSON=$(echo \""$DISTRO"\" |jq -c 'split(",")')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          OST_REPO="oVirt/ovirt-system-tests"
          OST_REF="master"

          if [ -n "$PR_URL" ]; then
            IFS=',' read -ra PR_URLS <<< "$PR_URL"
            for url in "${PR_URLS[@]}"; do
              if [[ "$url" == *"$OST_REPO"* ]]; then
                OST_REF=$(curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                    -H "Accept: application/vnd.github+json" \
                    $url | jq -r '.head.ref')
              fi
            done
          fi
          
          echo "SUITE=$SUITE" >> $GITHUB_OUTPUT
          echo "DISTRO=$DISTRO" >> $GITHUB_OUTPUT
          echo "DISTRO_JSON=$DISTRO_JSON" >> $GITHUB_OUTPUT
          echo "PR_URL=$PR_URL" >> $GITHUB_OUTPUT
          echo "COMMENT=$COMMENT" >> $GITHUB_OUTPUT
          echo "RUN_URL=$RUN_URL" >> $GITHUB_OUTPUT
          echo "OST_REF=$OST_REF" >> $GITHUB_OUTPUT
          
          echo "==== RUN PARAMS ========"
          echo "PR_URL: $PR_URL"
          echo "COMMENT: $COMMENT"
          echo "SUITE: $SUITE"
          echo "DISTRO: $DISTRO"
          echo "========================"

  trigger-ost:
    needs: decode_comment
    env:
      GITHUB_REPORT_FILE: md_report.md
      OST_DEPLOYMENT: /opt/actions-runner/_work/ost_deployment
      SUITE: ${{ needs.decode_comment.outputs.SUITE }}
      PR_URL: ${{ needs.decode_comment.outputs.PR_URL }}
      RUN_URL: ${{ needs.decode_comment.outputs.RUN_URL }}
      OST_REF: ${{ needs.decode_comment.outputs.OST_REF }}

    runs-on: ost-trigger

    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJSON(needs.decode_comment.outputs.DISTRO_JSON) }}
    steps:
      - name: Comment on PR that ost will start soon
        if: github.event_name != 'workflow_dispatch'
        run: |
          HERE="[here]($RUN_URL)"
          MSG=":hourglass_flowing_sand: Running ost suite **'$SUITE'** on distro **'${{ matrix.distro }}'**. \n\nFollow the progress $HERE. once the setup is done."
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ github.event.issue.url }}/comments \
            -d "{\"body\":\"${MSG}\"}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: oVirt/ovirt-system-tests
          ref: ${{ env.OST_REF }}

      - name: Setup ost 
        run: |
          /usr/bin/bash common/helpers/ost-image-packages.sh $SUITE ${{ matrix.distro }}
          if [ -f ost_image_vars.json ]; then
            jq . ost_image_vars.json
            /usr/bin/bash setup_for_ost.sh ost_image_vars.json -y
          else
            /usr/bin/bash setup_for_ost.sh -y
          fi

      - name: Run ${{ env.SUITE }} on ${{ matrix.distro }} for [${{ env.PR_URL }}]
        id: run-tests
        continue-on-error: true
        run: |
          ./ost.sh destroy
          cat md-report.ini >> pytest.ini
          export GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

          if [ -n "$PR_URL" ]; then
            if [[ "$PR_URL" == *","* ]]; then
              PR_URL=$(echo "$PR_URL" | sed 's/ //g')
              PR_URL=$(echo "$PR_URL" | sed 's/,/ --custom-repo /g')
            fi
            PR_URL="--custom-repo $PR_URL"
          fi
          
          /usr/bin/bash ost.sh run $SUITE ${{ matrix.distro }} $PR_URL
          
      - name: Create artifacts archive
        run: tar -czf exported-artifacts-${{ matrix.distro }}.tar.gz exported-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ost-artifacts-${{ matrix.distro }}
          path: exported-artifacts-${{ matrix.distro }}.tar.gz

      - name: Add report to summary
        shell: bash
        run: |
          cat $GITHUB_REPORT_FILE
          if [ -f "$GITHUB_REPORT_FILE" ]; then
            echo "<details><summary>Test Report (${{ matrix.distro }})</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$GITHUB_REPORT_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
        
      - name: Add report to PR
        if: always() && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          MESSAGE=":sob::broken_heart: ost suite **'$SUITE'** on distro **'${{ matrix.distro }}'** failed."
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            MESSAGE=":sunglasses::muscle: ost suite **'$SUITE'** on distro **'${{ matrix.distro }}'** finished successfully."
          fi 
          MESSAGE="$MESSAGE ([details]($RUN_URL))"
          JSON_PAYLOAD=$(jq -n --arg body "$MESSAGE" '{"body": $body}')
          echo "JSON_PAYLOAD: $JSON_PAYLOAD"
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ github.event.issue.url }}/comments \
            -d "$JSON_PAYLOAD"
          
      - name: Fail workflow if tests failed
        if: steps.run-tests.outcome == 'failure' 
        run: |
          echo "Tests failed. Failing the workflow."
          exit 1